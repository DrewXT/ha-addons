name: Lint & Validate Add-ons

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate add-on configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository.yaml
        run: |
          python3 -c "
          import yaml, sys
          with open('repository.yaml') as f:
            data = yaml.safe_load(f)
          required = ['name', 'url']
          for key in required:
            if key not in data:
              print(f'Missing key in repository.yaml: {key}')
              sys.exit(1)
          print('repository.yaml OK')
          "

      - name: Validate add-on config.yaml files
        run: |
          python3 -c "
          import yaml, sys, os, glob
          required_keys = ['name', 'description', 'version', 'slug', 'arch', 'startup', 'boot']
          errors = []
          for path in glob.glob('*/config.yaml'):
            with open(path) as f:
              data = yaml.safe_load(f)
            for key in required_keys:
              if key not in data:
                errors.append(f'{path}: missing key \"{key}\"')
            print(f'{path} OK')
          if errors:
            for e in errors:
              print(f'ERROR: {e}')
            sys.exit(1)
          "

      - name: Check shell scripts
        run: |
          find . -name '*.sh' | xargs shellcheck --severity=warning || true

  build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        addon: [speedtest-mqtt]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (amd64 dry-run)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.addon }}
          push: false
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:latest
          platforms: linux/amd64
          tags: ${{ matrix.addon }}:test
