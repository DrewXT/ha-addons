name: "Speedtest MQTT"
description: "Runs periodic speedtests and publishes results to MQTT for Home Assistant"
version: "1.0.1"
slug: "speedtest_mqtt"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: services
boot: auto
homeassistant_api: false
hassio_api: false
options:
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_topic: "speedtest/result"
  server_id: 15134
  interval_minutes: 60
schema:
  mqtt_broker: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  mqtt_topic: str
  server_id: int
  interval_minutes: int
map: []
ports: {}
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64:   ghcr.io/home-assistant/amd64-base:latest
  armhf:   ghcr.io/home-assistant/armhf-base:latest
  armv7:   ghcr.io/home-assistant/armv7-base:latest
