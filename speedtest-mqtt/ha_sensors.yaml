# =============================================================================
# Speedtest MQTT — Home Assistant Package File
# -----------------------------------------------------------------------------
# INSTALLATION:
#   1. Copy this file to /config/packages/speedtest.yaml
#   2. Make sure your configuration.yaml has:
#
#        homeassistant:
#          packages: !include_dir_named packages
#
#   3. Restart Home Assistant (full restart, not just reload)
#   4. Check Developer Tools → Template to verify sensors appear
# =============================================================================

# -----------------------------------------------------------------------------
# MQTT sensor — subscribes to the retained topic and exposes all attributes
# -----------------------------------------------------------------------------
mqtt:
  sensor:
    - name: "Speedtest Result"
      unique_id: "speedtest_result_mqtt"
      state_topic: "speedtest/result"
      value_template: "{{ value_json.state }}"
      json_attributes_topic: "speedtest/result"
      json_attributes_template: "{{ value_json.attributes | tojson }}"
      icon: mdi:speedometer
      force_update: true

# -----------------------------------------------------------------------------
# Template sensors — individual values pulled from MQTT sensor attributes
# Modern HA (2023.4+) template syntax
# -----------------------------------------------------------------------------
template:
  - sensor:
      - name: "Speedtest Download"
        unique_id: "speedtest_download"
        unit_of_measurement: "Mbit/s"
        state_class: measurement
        device_class: data_rate
        icon: mdi:download-network
        availability: "{{ states('sensor.speedtest_result') not in ['unknown', 'unavailable', ''] }}"
        state: >
          {{ state_attr('sensor.speedtest_result', 'download') | float(0) }}

      - name: "Speedtest Upload"
        unique_id: "speedtest_upload"
        unit_of_measurement: "Mbit/s"
        state_class: measurement
        device_class: data_rate
        icon: mdi:upload-network
        availability: "{{ states('sensor.speedtest_result') not in ['unknown', 'unavailable', ''] }}"
        state: >
          {{ state_attr('sensor.speedtest_result', 'upload') | float(0) }}

      - name: "Speedtest Ping"
        unique_id: "speedtest_ping"
        unit_of_measurement: "ms"
        state_class: measurement
        icon: mdi:lan-pending
        availability: "{{ states('sensor.speedtest_result') not in ['unknown', 'unavailable', ''] }}"
        state: >
          {{ state_attr('sensor.speedtest_result', 'ping') | float(0) }}

      - name: "Speedtest Jitter"
        unique_id: "speedtest_jitter"
        unit_of_measurement: "ms"
        state_class: measurement
        icon: mdi:sine-wave
        availability: "{{ states('sensor.speedtest_result') not in ['unknown', 'unavailable', ''] }}"
        state: >
          {{ state_attr('sensor.speedtest_result', 'jitter') | float(0) }}

      - name: "Speedtest Last Run"
        unique_id: "speedtest_lastrun"
        device_class: timestamp
        icon: mdi:clock
        availability: "{{ states('sensor.speedtest_result') not in ['unknown', 'unavailable', ''] }}"
        state: >
          {{ state_attr('sensor.speedtest_result', 'time_run') }}

      - name: "Speedtest ISP"
        unique_id: "speedtest_isp"
        icon: mdi:web
        availability: "{{ states('sensor.speedtest_result') not in ['unknown', 'unavailable', ''] }}"
        state: >
          {{ state_attr('sensor.speedtest_result', 'isp') }}

      - name: "Speedtest Server"
        unique_id: "speedtest_server"
        icon: mdi:server-network
        availability: "{{ states('sensor.speedtest_result') not in ['unknown', 'unavailable', ''] }}"
        state: >
          {{ state_attr('sensor.speedtest_result', 'server') }}

# -----------------------------------------------------------------------------
# Statistics sensors — rolling mean over last 2 days
# -----------------------------------------------------------------------------
sensor:
  - platform: statistics
    name: "Speedtest Download Average"
    unique_id: "speedtest_download_average"
    entity_id: sensor.speedtest_download
    state_characteristic: mean
    max_age:
      days: 2
    sampling_size: 10000

  - platform: statistics
    name: "Speedtest Upload Average"
    unique_id: "speedtest_upload_average"
    entity_id: sensor.speedtest_upload
    state_characteristic: mean
    max_age:
      days: 2
    sampling_size: 10000
